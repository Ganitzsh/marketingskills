name: Build skill ZIPs

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIPs for each skill
        run: |
          mkdir -p dist
          cd skills
          for skill_dir in */; do
            skill=$(basename "$skill_dir")
            zip -r "../dist/${skill}.zip" "${skill}/"
            echo "Zipped: ${skill}.zip"
          done
          # Also zip all skills together (each skill at root level)
          zip -r ../dist/all-marketing-skills.zip */
          cd ..
          echo "Zipped: all-marketing-skills.zip"
          ls -lh dist/

      - name: Upload ZIPs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketing-skills-zips
          path: dist/*.zip
          retention-days: 30

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: skills-latest
          name: "Latest Skills"
          body: |
            Download individual skills or the full bundle below.

            **Install in Claude Desktop:** Settings → Customize → Skills → Upload ZIP

            **Install via Claude Code:**
            ```
            /plugin marketplace add https://github.com/Ganitzsh/marketingskills
            ```
          files: dist/*.zip
          make_latest: true
