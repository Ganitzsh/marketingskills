name: Daily Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/coreyhaines31/marketingskills.git || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into main (skills only, preserve our files)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Merge upstream but keep our marketplace.json and workflows
          git merge upstream/main --no-edit --strategy-option=ours -- .claude-plugin/marketplace.json .github/workflows/ || true
          git merge upstream/main --no-edit --allow-unrelated-histories || echo "Already up to date"

      - name: Push to fork
        run: git push origin main
